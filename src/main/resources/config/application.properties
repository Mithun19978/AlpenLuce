#------------------------# application properties start-------------------------
# General Configuration
application.name=AlpenLuce
application.version=1.0.0
application.base-url=http://localhost:8080
spring.main.allow-bean-definition-overriding=true

# Super Admin Configuration
supreme-user.name=admin
supreme-user.password=Admin@123
supreme-user.mobilenumber=9876543210
supreme-user.mail=superadmin@gmail.com
supreme-user.role=2
supreme-user.active=1
supreme-user.gender=1


# User Role (1-USER, 2-ADMIN, 4-TECHNICAL, 8-SUPPORT) & Gender (1-male, 2-female) Configuration
allowed-roles=1,2,4,8
allowed-genders=1,2

# Password Policy
password.minimum-length=8
password.minimum-numbers=1
password.minimum-upper=1
password.minimum-lower=1
password.minimum-alphabets=1
password.min-special-characters=1
password.allowed-special-characters=@#

# Mail Configuration
mail.host=smtp.gmail.com
mail.port=587
mail.username=no-reply@alpenluce.com
mail.password=your-mail-password
mail.properties.mail-smtp-auth=true
mail.properties.mail-smtp-starttls-enable=true

# File Upload Settings
max-file-size=10MB
max-request-size=15MB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

# AWS S3 — Product Image Storage
# Set aws.s3.enabled=true and fill in real credentials when you have an S3 bucket
# While false, the app runs normally — image upload returns a "not configured" message
aws.s3.enabled=true
aws.s3.bucket-name=alphenluce
aws.s3.region=us-east-1
aws.s3.access-key=${AWS_S3_ACCESS_KEY}
aws.s3.secret-key=${AWS_S3_SECRET_KEY}

# Razorpay Payment Gateway (https://dashboard.razorpay.com)
# Use Test keys for dev, Live keys for production
razorpay.key-id=${rzp_KEY_ID}
razorpay.key-secret=${rzp_KEY_SECRET}
# Webhook secret — set this in Razorpay Dashboard > Webhooks
razorpay.webhook-secret=${rzp_WEBHOOK_SECRET}

# Shiprocket (https://app.shiprocket.in)
# Leave blank to disable — app runs normally without it
shiprocket.email=
shiprocket.password=
# Pickup location name — must match a warehouse configured in Shiprocket dashboard
shiprocket.pickup-location=Primary
# Sender details shown on shipping label
shiprocket.pickup-name=AlpenLuce
shiprocket.pickup-phone=9876543210
shiprocket.pickup-pincode=600001

# Session
spring.session.store-type=none

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google

# Load secrets + log.properties (single import — Spring Boot ignores duplicate keys, last wins)
spring.config.import=optional:classpath:security/api_secret_keys/application-secret.properties,file:${SHOP_HOME}/config/log.properties
#------------------------# application properties end-------------------------
